name: portable-version-package

on:
  workflow_call:
    inputs:
      build_plan_artifact_name:
        required: false
        type: string
        default: steam-packer-build-plan
    secrets:
      desktop_azure_sas_url:
        required: true
      service_azure_sas_url:
        required: true
      steam_azure_sas_url:
        required: false
      steam_depot_id_linux:
        required: false
      steam_depot_id_windows:
        required: false
      steam_depot_id_macos:
        required: false

permissions:
  contents: read
  actions: read

jobs:
  resolve_handoff:
    name: Resolve delegated handoff
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download Portable Version build plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build_plan_artifact_name }}
          path: ${{ runner.temp }}/build-plan

      - name: Validate Portable Version handoff
        id: resolve
        shell: bash
        run: |
          node scripts/resolve-portable-version-handoff.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json"

  package:
    name: Package ${{ matrix.platform }}
    needs: resolve_handoff
    if: needs.resolve_handoff.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve_handoff.outputs.platform_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download Portable Version build plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build_plan_artifact_name }}
          path: ${{ runner.temp }}/build-plan

      - name: Prepare Desktop archive workspace
        shell: bash
        env:
          STEAM_PACKER_DESKTOP_AZURE_SAS_URL: ${{ secrets.desktop_azure_sas_url }}
        run: |
          node scripts/prepare-packaging-workspace.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/portable-version-${{ matrix.platform }}"

      - name: Download and inject service payload
        shell: bash
        env:
          STEAM_PACKER_SERVICE_AZURE_SAS_URL: ${{ secrets.service_azure_sas_url }}
        run: |
          node scripts/stage-portable-payload.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/portable-version-${{ matrix.platform }}"

      - name: Stage portable Node and OpenSpec toolchain
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/stage-portable-toolchain.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/portable-version-${{ matrix.platform }}"

      - name: Verify portable toolchain
        shell: bash
        run: |
          node scripts/verify-portable-toolchain.mjs \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/portable-version-${{ matrix.platform }}"

      - name: Repack portable Desktop archive
        shell: bash
        run: |
          node scripts/package-desktop-portable.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/portable-version-${{ matrix.platform }}"

      - name: Upload delegated package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: portable-release-package-${{ matrix.platform }}
          path: |
            ${{ runner.temp }}/portable-version-${{ matrix.platform }}/artifact-inventory-${{ matrix.platform }}.json
            ${{ runner.temp }}/portable-version-${{ matrix.platform }}/artifact-checksums-${{ matrix.platform }}.txt
            ${{ runner.temp }}/portable-version-${{ matrix.platform }}/payload-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/portable-version-${{ matrix.platform }}/toolchain-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/portable-version-${{ matrix.platform }}/release-assets
          if-no-files-found: error

  publish:
    name: Publish delegated release
    needs:
      - resolve_handoff
      - package
    if: needs.resolve_handoff.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download Portable Version build plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build_plan_artifact_name }}
          path: ${{ runner.temp }}/build-plan

      - name: Download delegated package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: portable-release-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/publish-input

      - name: Publish Portable Version release or emit dry-run report
        shell: bash
        env:
          STEAM_PACKER_STEAM_AZURE_SAS_URL: ${{ secrets.steam_azure_sas_url }}
        run: |
          node scripts/publish-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$RUNNER_TEMP/publish-input" \
            --output-dir "$RUNNER_TEMP/release-metadata"

      - name: Upload delegated release metadata
        uses: actions/upload-artifact@v6
        with:
          name: portable-release-metadata-${{ needs.resolve_handoff.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata
          if-no-files-found: error
