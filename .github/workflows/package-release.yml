name: package-release

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_call:
    inputs:
      build_plan_artifact_name:
        required: false
        type: string
        default: steam-packer-build-plan
    secrets:
      desktop_azure_sas_url:
        required: true
      service_azure_sas_url:
        required: true
      steam_azure_sas_url:
        required: false
      steam_depot_id_linux:
        required: false
      steam_depot_id_windows:
        required: false
      steam_depot_id_macos:
        required: false
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Continue even when the latest normalized Steam release tag already exists in Azure.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Package the latest desktop and service releases without uploading to the Azure Steam container.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

env:
  RESOLVED_BUILD_PLAN_ARTIFACT_NAME: resolved-build-plan
  DESKTOP_AZURE_SAS_URL: ${{ secrets.desktop_azure_sas_url || secrets.STEAM_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL }}
  SERVICE_AZURE_SAS_URL: ${{ secrets.service_azure_sas_url || secrets.STEAM_PACKER_SERVICE_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL }}
  STEAM_AZURE_SAS_URL: ${{ secrets.steam_azure_sas_url || secrets.STEAM_PACKER_STEAM_AZURE_SAS_URL || secrets.STEAM_AZURE_SAS_URL }}

jobs:
  resolve_plan:
    name: Resolve release plan
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download release plan artifact from caller run
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build_plan_artifact_name }}
          path: ${{ runner.temp }}/build-plan

      - name: Resolve latest build plan for automation
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STEAM_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
          STEAM_PACKER_SERVICE_AZURE_SAS_URL: ${{ env.SERVICE_AZURE_SAS_URL }}
          STEAM_PACKER_STEAM_AZURE_SAS_URL: ${{ env.STEAM_AZURE_SAS_URL }}
        run: |
          mkdir -p "$RUNNER_TEMP/build-plan"
          node scripts/resolve-dispatch-build-plan.mjs \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Validate release plan
        id: resolve
        shell: bash
        run: |
          node scripts/resolve-release-plan.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Upload resolved release plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan/build-plan.json
          if-no-files-found: error

  package:
    name: Package ${{ matrix.platform }}
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve_plan.outputs.platform_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Prepare Desktop archive workspace
        shell: bash
        env:
          STEAM_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
        run: |
          node scripts/prepare-packaging-workspace.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/release-${{ matrix.platform }}"

      - name: Download and inject service payload
        shell: bash
        env:
          STEAM_PACKER_SERVICE_AZURE_SAS_URL: ${{ env.SERVICE_AZURE_SAS_URL }}
        run: |
          node scripts/stage-portable-payload.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/release-${{ matrix.platform }}"

      - name: Verify Desktop-authored portable toolchain
        shell: bash
        run: |
          node scripts/verify-portable-toolchain.mjs \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/release-${{ matrix.platform }}"

      - name: Repack portable Desktop archive
        shell: bash
        run: |
          node scripts/package-desktop-portable.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/release-${{ matrix.platform }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-package-${{ matrix.platform }}
          path: |
            ${{ runner.temp }}/release-${{ matrix.platform }}/artifact-inventory-${{ matrix.platform }}.json
            ${{ runner.temp }}/release-${{ matrix.platform }}/artifact-checksums-${{ matrix.platform }}.txt
            ${{ runner.temp }}/release-${{ matrix.platform }}/payload-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/release-${{ matrix.platform }}/toolchain-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/release-${{ matrix.platform }}/release-assets
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - resolve_plan
      - package
    if: needs.resolve_plan.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout steam_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/publish-input

      - name: Publish release or emit dry-run report
        shell: bash
        env:
          STEAM_PACKER_STEAM_AZURE_SAS_URL: ${{ env.STEAM_AZURE_SAS_URL }}
        run: |
          node scripts/publish-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$RUNNER_TEMP/publish-input" \
            --output-dir "$RUNNER_TEMP/release-metadata"

      - name: Upload release metadata
        uses: actions/upload-artifact@v6
        with:
          name: release-metadata-${{ needs.resolve_plan.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata
          if-no-files-found: error
